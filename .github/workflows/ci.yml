name: CI

# Keeps main self-verifying: the full unit/API/bundle suite runs on every branch
# push and on PRs into main. Tag pushes are handled by release.yml, not here
# (this filter matches branches only).
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Newer runs of the same ref cancel older, still-running ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Installs every workspace and builds the better-sqlite3 native module.
      - name: Install dependencies
        run: npm ci

      # Fails fast on type errors in any workspace (packages/core, packages/ui,
      # apps/desktop) before the slower test suite runs. Phase 23 added this
      # after a hoisting-driven TypeScript version mismatch broke packages/ui's
      # typecheck without failing `npm test`, which has no typecheck step of
      # its own. No --if-present: every workspace is expected to declare a
      # typecheck script, and a future workspace that omits one should
      # hard-fail this step, not be silently skipped (Phase 27).
      - name: Typecheck workspaces
        run: npm run typecheck --workspaces

      # core + desktop. The desktop suite rebuilds and evaluates the
      # electron-vite main bundle; no display or real Electron launch is needed.
      - name: Unit / API / bundle tests
        run: npm test
