name: Release Desktop

# Builds the Windows installer. On a version tag it also publishes a GitHub
# Release with the .exe attached; a manual run only uploads the artifact.
#
# Windows is required, not a preference: electron-builder's NSIS target and the
# better-sqlite3 native rebuild must run on real Windows to produce a working
# installer.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+*" # v1.0, v1.2.3
      - "[0-9]+.[0-9]+*" #  1.0,  1.2.3  (the 1.0 release used this form)
    # Phase 15: build on every merge to main too, so there's always one obvious
    # rolling download link between version tags (published below as a
    # pre-release, kept distinct from the tag-triggered Release).
    branches:
      - main
  workflow_dispatch:

# Needed by the release step to create the Release and upload assets.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # node-gyp (used to rebuild better-sqlite3's native module) relies on
      # distutils, which Python 3.12 removed. Pin 3.11 so the source build
      # works regardless of the runner's default Python version.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      # Produces apps/desktop/release/Toastmasters Tools Setup <version>.exe.
      # Code-signing is skipped (no certificate); that is expected.
      - name: Build desktop installer
        run: npm run desktop:build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: toastmasters-tools-installer
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
          if-no-files-found: error

      # Only on a tag push — a manual run has no tag and stops after the artifact.
      # Pinned to a major version; uses the built-in GITHUB_TOKEN.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
          fail_on_unmatched_files: true
          generate_release_notes: true

      # Only on a push to main — publishes/refreshes a single rolling
      # pre-release so users always have one obvious download link for the
      # newest build without waiting for a formal version tag (Phase 15).
      # softprops/action-gh-release creates the "latest-main" tag on first run
      # and updates the existing release (replacing same-named assets) on
      # every subsequent run for the same tag_name — no manual git tag needed.
      - name: Publish rolling main pre-release
        # event_name guard matters: workflow_dispatch runs also report
        # github.ref == 'refs/heads/main' when launched from the default
        # branch, which would otherwise publish this release on every manual
        # test run too — contradicting the documented "manual runs only
        # upload an artifact" behaviour (README.md / CONTRIBUTING.md).
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: "Latest build from main"
          prerelease: true
          make_latest: false
          body: "Automatic build from the latest `main` commit (${{ github.sha }})."
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
          fail_on_unmatched_files: true
