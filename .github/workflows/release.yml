name: Release Desktop

# Builds the Windows installer. On a version tag it also publishes a GitHub
# Release with the .exe attached; a manual run only uploads the artifact.
#
# Windows is required, not a preference: electron-builder's NSIS target and the
# better-sqlite3 native rebuild must run on real Windows to produce a working
# installer.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+*" # v1.0, v1.2.3
      - "[0-9]+.[0-9]+*" #  1.0,  1.2.3  (the 1.0 release used this form)
    # Phase 15: build on every merge to main too, so there's always one obvious
    # rolling download link between version tags (published below as a
    # pre-release, kept distinct from the tag-triggered Release).
    branches:
      - main
  workflow_dispatch:

# Needed by the release step to create the Release and upload assets.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # node-gyp (used to rebuild better-sqlite3's native module) relies on
      # distutils, which Python 3.12 removed. Pin 3.11 so the source build
      # works regardless of the runner's default Python version.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      # Produces apps/desktop/release/Toastmasters Tools Setup <version>.exe.
      # Code-signing is skipped (no certificate); that is expected.
      - name: Build desktop installer
        run: npm run desktop:build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: toastmasters-tools-installer
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
          if-no-files-found: error

      # Phase 22: on a push to main, auto-tag + auto-release a version bump so
      # the VPE no longer has to create the GitHub Release by hand. Idempotent —
      # a docs-only merge with no version bump finds the tag already exists
      # (checked against the remote, not the locally fetched tags) and no-ops.
      # Same event_name guard as "Publish rolling main pre-release" below: a
      # workflow_dispatch run launched from main also reports
      # github.ref == 'refs/heads/main', so the event_name check is required to
      # keep a manual run from auto-tagging.
      - name: Check for an existing version tag
        id: check-tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "new_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "new_tag=true" >> "$GITHUB_OUTPUT"
          fi

      # Only when package.json's version has not already been tagged. Uses the
      # GITHUB_TOKEN-authenticated remote actions/checkout already configured —
      # no new secret.
      - name: Create and push the version tag
        if: |
          github.ref == 'refs/heads/main' && github.event_name == 'push' &&
          steps.check-tag.outputs.new_tag == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.check-tag.outputs.version }}" -m "Release v${{ steps.check-tag.outputs.version }}"
          git push origin "v${{ steps.check-tag.outputs.version }}"

      # Publishes the versioned Release directly in this job rather than
      # relying on the tag-push trigger below: a tag pushed with the default
      # GITHUB_TOKEN does not itself re-trigger a workflow run (GitHub's
      # loop-prevention), so that trigger would never fire for a tag created
      # by the step above.
      - name: Publish GitHub Release for the new tag
        if: |
          github.ref == 'refs/heads/main' && github.event_name == 'push' &&
          steps.check-tag.outputs.new_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check-tag.outputs.version }}
          generate_release_notes: true
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
          fail_on_unmatched_files: true

      # Only on a tag push — a manual run has no tag and stops after the artifact.
      # Pinned to a major version; uses the built-in GITHUB_TOKEN.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
          fail_on_unmatched_files: true
          generate_release_notes: true

      # Only on a push to main — publishes/refreshes a single rolling
      # pre-release so users always have one obvious download link for the
      # newest build without waiting for a formal version tag (Phase 15).
      # softprops/action-gh-release creates the "latest-main" tag on first run
      # and updates the existing release (replacing same-named assets) on
      # every subsequent run for the same tag_name — no manual git tag needed.
      - name: Publish rolling main pre-release
        # event_name guard matters: workflow_dispatch runs also report
        # github.ref == 'refs/heads/main' when launched from the default
        # branch, which would otherwise publish this release on every manual
        # test run too — contradicting the documented "manual runs only
        # upload an artifact" behaviour (README.md / CONTRIBUTING.md).
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: "Latest build from main"
          prerelease: true
          make_latest: false
          body: "Automatic build from the latest `main` commit (${{ github.sha }})."
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
          fail_on_unmatched_files: true
