appId: org.toastmasters.tools
productName: Toastmasters Tools
copyright: Toastmasters Tools

directories:
  output: release

# Only the electron-vite output and the manifest. Production dependencies
# (better-sqlite3) are collected automatically from package.json.
files:
  - out/**/*
  - package.json

# better-sqlite3 is a native module: its .node binding cannot be loaded from
# inside an asar archive, so it is unpacked next to it.
asarUnpack:
  - "**/*.node"
  - node_modules/better-sqlite3/**/*

# Rebuild the native binding against Electron's ABI (it is installed against
# Node's ABI for the CLI and the web app).
#
# ⚠️ npm workspaces hoist better-sqlite3 to the *root* node_modules, so this
# rebuild rewrites the same binary the CLI, the Next.js app and the test suite
# load — leaving them with an Electron-ABI .node they cannot dlopen
# (NODE_MODULE_VERSION 130 vs 115). The installer is packed before that matters,
# so the `build` script restores the Node-ABI build afterwards via
# `restore:node-abi`. Do not remove that step.
npmRebuild: true

win:
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName} Setup ${version}.${ext}
